name: thix_id
description: "THIX ID - Une identité numérique sécurisée"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  stripe_sdk: ^5.0.0
  signature: ^6.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # State management & routing
  provider: ^6.1.2
  flutter_bloc: ^8.1.3
  flutter_riverpod: ^2.4.9
  go_router: ^16.3.0
  
  # Charts & graphs
  fl_chart: 0.68.0
  
  # Supabase & backend
  supabase_flutter: '>=1.10.0'
  realtime_client: ^2.7.3
  http: ^1.2.2
  
  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.4
  
  # Media & files
  video_player: '>=2.9.2'
  image_picker: ^1.0.5
  file_picker: '>=8.1.2'
  record: ^5.1.2
  audioplayers: ^5.2.0
  printing: ^5.13.0
  pdf: ^3.11.0
  
  # Agora calls
  agora_rtc_engine: ^6.3.0
  
  # Location & NFC
  geolocator: 13.0.4
  nfc_manager: ^4.0.0
  
  # QR / Barcode
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.0
  
  # Notifications & permissions
  flutter_local_notifications: ^20.0.0
  permission_handler: ^12.0.0
  
  # Sharing & encryption
  share_plus: ^10.0.0
  crypto: ^3.0.0
  encrypt: ^5.0.3
  url_launcher: ^6.3.0
  
  # Contacts & biometrics
  contacts_service: ^0.6.3
  local_auth: ^2.1.7
  
  # JWT decoding
  jwt_decoder: ^2.0.0
  
  # Caching
  cached_network_image: ^3.3.0
  
  # Internationalization
  intl: ^0.20.2

  # Collection utilities
  collection: ^1.18.0

  # ==================== THIX MARKET ====================
  # Carrousel et animations
  carousel_slider: ^4.2.1
  shimmer: ^3.0.0
  
  # Évaluations
  flutter_rating_bar: ^4.0.1
  
  
  
  # Utilitaires
  uuid: ^4.5.1
  debounce_throttle: ^2.0.0
  
  # Calendrier pour les services
  table_calendar: ^3.1.2
  
  # Cartes Google
  google_maps_flutter: ^2.13.0
  
  # Firebase Cloud Messaging (notifications push)
  firebase_messaging: ^15.2.0
  
  # Compression d'images
  flutter_image_compress: ^2.4.0
  
  # Export CSV
  csv: ^6.0.0
  
  # Pour les imports Excel/CSV (optionnel)
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/dreamflow_icon.jpg"
  remove_alpha_ios: true
